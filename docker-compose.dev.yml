# Local development: Next.js + Docusaurus (live /docs/ via Next proxy).
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# Requires .env.local (copy from .env.example). Postgres/Redis still external
# (e.g. Supabase + Upstash) unless you add those services yourself.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "3456:3456"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      DOCS_DEV_ORIGIN: http://127.0.0.1:3456
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
      - dev_docs_site_node_modules:/app/packages/docs-site/node_modules
    restart: unless-stopped

volumes:
  dev_node_modules:
  dev_docs_site_node_modules:
