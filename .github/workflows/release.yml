# Automatic releases for CLI + browser extension.
#
# On merge to main (when package version files change):
#   1. Ensures git tag v{version} exists (creates it if needed).
#   2. Builds CLI + extension and uploads assets to GitHub Releases.
#
# Secrets:
#   - GITHUB_TOKEN (built-in) — GitHub Releases
#   - NPM_TOKEN (required for npm / npx) — Automation token from npmjs.com

name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/package.json"
      - "packages/browser-extension/package.json"
      - "packages/cli/**"
      - "packages/browser-extension/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Created automatically from package.json when empty."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Tag, build, and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            TAG="v${VERSION}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version $VERSION)"

      - name: Create tag if missing
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.tag == ''
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package versions with tag
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
          node -e "
            const fs = require('fs');
            const p = 'packages/browser-extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Build CLI
        run: pnpm --filter dot-vault build

      - name: Package CLI
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          pnpm deploy --filter=dot-vault --prod "artifacts/dotvault-cli"
          tar -czf "dotvault-cli-${VERSION}.tar.gz" -C artifacts dotvault-cli
          (cd packages/cli && pnpm pack --pack-destination "$GITHUB_WORKSPACE")
          mv "$GITHUB_WORKSPACE/dot-vault-${VERSION}.tgz" "dotvault-cli-${VERSION}.npm.tgz"

      - name: Publish CLI to npm
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipped npm publish."
            echo "Add an npm Automation token as repository secret NPM_TOKEN to enable npx dot-vault."
            exit 0
          fi
          npm publish --access public

      - name: Build browser extension
        run: pnpm --filter dotvault-browser-extension build

      - name: Package browser extension
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          (cd packages/browser-extension/dist && zip -r "$GITHUB_WORKSPACE/dotvault-extension-${VERSION}.zip" .)

      - name: Checksums
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          {
            shasum -a 256 "dotvault-cli-${VERSION}.tar.gz"
            shasum -a 256 "dotvault-cli-${VERSION}.npm.tgz"
            shasum -a 256 "dotvault-extension-${VERSION}.zip"
          } > "SHA256SUMS-${VERSION}.txt"
          cat "SHA256SUMS-${VERSION}.txt"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: DotVault ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dotvault-cli-*
            dotvault-extension-*
            SHA256SUMS-*
          fail_on_unmatched_files: true
