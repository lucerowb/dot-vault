# Releases CLI + browser extension when packages/cli or packages/browser-extension change.
#
# Versioning: before publish, bumps packages/cli to the next patch if that version
# already exists on npm or as a git tag — no manual version bump required for fixes.
#
# Secrets: GITHUB_TOKEN (built-in), NPM_TOKEN (npm publish)

name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/browser-extension/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Pin tag (e.g. v0.1.2). Leave empty for auto version."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect changes and resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      cli_changed: ${{ steps.changes.outputs.cli == 'true' || github.event_name == 'workflow_dispatch' }}
      extension_changed: ${{ steps.changes.outputs.extension == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        if: github.event_name == 'push'
        with:
          filters: |
            cli:
              - 'packages/cli/**'
            extension:
              - 'packages/browser-extension/**'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Resolve next release version
        id: version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          bump_patch() {
            local v="${1#v}"
            local major minor patch
            IFS=. read -r major minor patch <<< "$v"
            echo "${major}.${minor}.$((patch + 1))"
          }

          version_gt() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" = "$2" ] && [ "$1" != "$2" ]
          }

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            VERSION="${TAG#v}"
            echo "Using pinned tag $TAG"
          else
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            PUBLISHED="0.0.0"
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              PUBLISHED=$(npm view @lucerowb/dot-vault version 2>/dev/null || echo "0.0.0")
            fi

            echo "package.json version: $VERSION"
            echo "npm published version: $PUBLISHED"

            # Need a new version if npm already has this one, or git tag exists
            needs_bump=false
            if [ "$VERSION" = "$PUBLISHED" ]; then
              needs_bump=true
              echo "npm already has $VERSION — will bump patch"
            fi
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              needs_bump=true
              echo "git tag v${VERSION} exists — will bump patch"
            fi

            if [ "$needs_bump" = true ]; then
              if version_gt "$VERSION" "$PUBLISHED"; then
                VERSION=$(bump_patch "$VERSION")
              else
                VERSION=$(bump_patch "$PUBLISHED")
              fi
            fi

            # Ensure tag slot is free
            while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
              VERSION=$(bump_patch "$VERSION")
            done

            # Ensure npm slot is free (when token available)
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              while npm view "@lucerowb/dot-vault@${VERSION}" version >/dev/null 2>&1; do
                VERSION=$(bump_patch "$VERSION")
              done
            fi

            TAG="v${VERSION}"
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
            echo "Resolved release version: $VERSION"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: github.event.inputs.tag == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          if git diff --staged --quiet; then
            echo "No package.json change to commit."
            exit 0
          fi
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create release tag
        if: github.event.inputs.tag == ''
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  github-release:
    name: GitHub Release assets
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package versions
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
          node -e "
            const fs = require('fs');
            const p = 'packages/browser-extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build CLI
        run: pnpm -C packages/cli run build

      - name: Package CLI
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          rm -rf artifacts
          pnpm --filter "@lucerowb/dot-vault" deploy --prod "artifacts/dotvault-cli"
          tar -czf "dotvault-cli-${VERSION}.tar.gz" -C artifacts dotvault-cli
          (cd packages/cli && pnpm pack --pack-destination "$GITHUB_WORKSPACE")
          PACKED=$(ls -1 "$GITHUB_WORKSPACE"/*.tgz | head -1)
          test -n "$PACKED"
          mv "$PACKED" "dotvault-cli-${VERSION}.npm.tgz"
          ls -la "dotvault-cli-${VERSION}".*

      - name: Build browser extension
        run: pnpm -C packages/browser-extension run build

      - name: Package browser extension
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          test -d packages/browser-extension/dist
          (cd packages/browser-extension/dist && zip -qr "$GITHUB_WORKSPACE/dotvault-extension-${VERSION}.zip" .)
          ls -la "dotvault-extension-${VERSION}.zip"

      - name: Checksums
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          SUMFILE="SHA256SUMS-${VERSION}.txt"
          : > "$SUMFILE"
          for f in "dotvault-cli-${VERSION}.tar.gz" "dotvault-cli-${VERSION}.npm.tgz" "dotvault-extension-${VERSION}.zip"; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> "$SUMFILE"
            fi
          done
          if [ ! -s "$SUMFILE" ]; then
            echo "::error::No release artifacts in $(pwd)"
            ls -la
            exit 1
          fi
          cat "$SUMFILE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DotVault ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dotvault-cli-${{ needs.prepare.outputs.version }}.tar.gz
            dotvault-cli-${{ needs.prepare.outputs.version }}.npm.tgz
            dotvault-extension-${{ needs.prepare.outputs.version }}.zip
            SHA256SUMS-${{ needs.prepare.outputs.version }}.txt
          fail_on_unmatched_files: true

  npm-publish:
    name: Publish to npm
    needs: [prepare, github-release]
    if: needs.prepare.outputs.cli_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          always-auth: true
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set CLI version
        run: |
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version --prefix packages/cli

      - name: Build and publish CLI
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN not set — skip npm publish."
            exit 0
          fi
          pnpm run build
          npm whoami
          npm publish --access public
