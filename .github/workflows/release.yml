# Automatic releases for CLI + browser extension.
#
# Flow:
#   1. Bump `version` in packages/cli/package.json (and merge to main).
#   2. create-tag job pushes tag v{version} if it does not exist yet.
#   3. Tag push runs release job → builds assets → uploads to GitHub Releases.
#
# No repository secrets required — uses the built-in GITHUB_TOKEN.

name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/package.json"
      - "packages/browser-extension/package.json"
      - ".github/workflows/release.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild assets for (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-tag:
    name: Create version tag
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push tag from package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — release job will run only if assets are missing."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          echo "Created and pushed ${TAG}"

  release:
    name: Build and publish assets
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging release $TAG (version $VERSION)"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package versions with tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
          npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
          node -e "
            const fs = require('fs');
            const p = 'packages/browser-extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build CLI
        run: pnpm --filter dotvault build

      - name: Package CLI
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          pnpm deploy --filter=dotvault --prod "artifacts/dotvault-cli"
          tar -czf "dotvault-cli-${VERSION}.tar.gz" -C artifacts dotvault-cli
          (cd packages/cli && pnpm pack --pack-destination "$GITHUB_WORKSPACE")
          mv "$GITHUB_WORKSPACE/dotvault-${VERSION}.tgz" "dotvault-cli-${VERSION}.npm.tgz"

      - name: Build browser extension
        run: pnpm --filter dotvault-browser-extension build

      - name: Package browser extension
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          (cd packages/browser-extension/dist && zip -r "$GITHUB_WORKSPACE/dotvault-extension-${VERSION}.zip" .)

      - name: Checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            shasum -a 256 "dotvault-cli-${VERSION}.tar.gz"
            shasum -a 256 "dotvault-cli-${VERSION}.npm.tgz"
            shasum -a 256 "dotvault-extension-${VERSION}.zip"
          } > "SHA256SUMS-${VERSION}.txt"
          cat "SHA256SUMS-${VERSION}.txt"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DotVault ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dotvault-cli-*
            dotvault-extension-*
            SHA256SUMS-*
          fail_on_unmatched_files: true
