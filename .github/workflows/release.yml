# Releases CLI + browser extension when packages/cli or packages/browser-extension change.
#
# npm publish + Homebrew run only when packages/cli/** changed (not on extension-only releases).
# Versioning: CLI releases bump packages/cli; extension-only releases bump manifest.json only.
#
# Secrets: GITHUB_TOKEN (built-in), NPM_TOKEN (npm publish)

name: Release

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - "packages/browser-extension/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Pin tag (e.g. v0.1.2). Leave empty for auto version."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Detect changes and resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.flags.outputs.should_release }}
      cli_changed: ${{ steps.flags.outputs.cli_changed }}
      extension_changed: ${{ steps.flags.outputs.extension_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve path filter base
        id: base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          elif git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "ref=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ steps.base.outputs.ref }}
          filters: |
            cli:
              - 'packages/cli/**'
            extension:
              - 'packages/browser-extension/**'

      - name: Set release flags
        id: flags
        run: |
          set -euo pipefail
          CLI="false"
          EXT="false"

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            PARENT="$(git rev-list -n 1 "${TAG}^" 2>/dev/null || true)"
            if [ -n "$PARENT" ] && git diff --name-only "$PARENT" "$TAG" -- packages/cli/ | grep -q .; then
              CLI="true"
            fi
            if [ -n "$PARENT" ] && git diff --name-only "$PARENT" "$TAG" -- packages/browser-extension/ | grep -q .; then
              EXT="true"
            fi
            # Pinned tag without detectable parent: build both artifact types, npm only if CLI touched
            if [ -z "$PARENT" ]; then
              EXT="true"
            fi
          else
            if [ "${{ steps.changes.outputs.cli }}" = "true" ]; then CLI="true"; fi
            if [ "${{ steps.changes.outputs.extension }}" = "true" ]; then EXT="true"; fi
          fi

          SHOULD="false"
          if [ -n "${{ github.event.inputs.tag }}" ] || [ "$CLI" = "true" ] || [ "$EXT" = "true" ]; then
            SHOULD="true"
          fi

          echo "cli_changed=$CLI" >> "$GITHUB_OUTPUT"
          echo "extension_changed=$EXT" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "CLI changed: $CLI | Extension changed: $EXT | Release: $SHOULD"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Resolve next release version
        id: version
        if: steps.flags.outputs.should_release == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CLI_CHANGED: ${{ steps.flags.outputs.cli_changed }}
          EXT_CHANGED: ${{ steps.flags.outputs.extension_changed }}
        run: |
          set -euo pipefail

          bump_patch() {
            local v="${1#v}"
            local major minor patch
            IFS=. read -r major minor patch <<< "$v"
            echo "${major}.${minor}.$((patch + 1))"
          }

          version_gt() {
            [ "$(printf '%s\n' "$1" "$2" | sort -V | tail -1)" = "$2" ] && [ "$1" != "$2" ]
          }

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            VERSION="${TAG#v}"
            echo "Using pinned tag $TAG"
          elif [ "$CLI_CHANGED" = "true" ]; then
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            PUBLISHED="0.0.0"
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              PUBLISHED=$(npm view @lucerowb/dot-vault version 2>/dev/null || echo "0.0.0")
            fi

            echo "CLI package.json version: $VERSION"
            echo "npm published version: $PUBLISHED"

            needs_bump=false
            if [ "$VERSION" = "$PUBLISHED" ]; then
              needs_bump=true
              echo "npm already has $VERSION — will bump patch"
            fi
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              needs_bump=true
              echo "git tag v${VERSION} exists — will bump patch"
            fi

            if [ "$needs_bump" = true ]; then
              if version_gt "$VERSION" "$PUBLISHED"; then
                VERSION=$(bump_patch "$VERSION")
              else
                VERSION=$(bump_patch "$PUBLISHED")
              fi
            fi

            while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
              VERSION=$(bump_patch "$VERSION")
            done

            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              while npm view "@lucerowb/dot-vault@${VERSION}" version >/dev/null 2>&1; do
                VERSION=$(bump_patch "$VERSION")
              done
            fi

            TAG="v${VERSION}"
            export VERSION
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
            if [ "$EXT_CHANGED" = "true" ]; then
              npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
              node -e "
                const fs = require('fs');
                const p = 'packages/browser-extension/manifest.json';
                const m = JSON.parse(fs.readFileSync(p, 'utf8'));
                m.version = process.env.VERSION;
                fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
              "
            fi
            echo "Resolved CLI release version: $VERSION"
          elif [ "$EXT_CHANGED" = "true" ]; then
            VERSION=$(node -p "require('./packages/browser-extension/manifest.json').version")
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              VERSION=$(bump_patch "$VERSION")
            fi
            while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
              VERSION=$(bump_patch "$VERSION")
            done
            TAG="v${VERSION}"
            export VERSION
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
            node -e "
              const fs = require('fs');
              const p = 'packages/browser-extension/manifest.json';
              const m = JSON.parse(fs.readFileSync(p, 'utf8'));
              m.version = process.env.VERSION;
              fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
            "
            echo "Resolved extension-only release version: $VERSION"
          else
            echo "::error::No CLI or extension changes to release."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: github.event.inputs.tag == '' && steps.flags.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.flags.outputs.cli_changed }}" = "true" ]; then
            git add packages/cli/package.json
          fi
          if [ "${{ steps.flags.outputs.extension_changed }}" = "true" ]; then
            git add packages/browser-extension/package.json packages/browser-extension/manifest.json
          fi
          if git diff --staged --quiet; then
            echo "No version files changed to commit."
            exit 0
          fi
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create release tag
        if: github.event.inputs.tag == '' && steps.flags.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  github-release:
    name: GitHub Release assets
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package versions
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ "${{ needs.prepare.outputs.cli_changed }}" = "true" ]; then
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/cli
          fi
          if [ "${{ needs.prepare.outputs.extension_changed }}" = "true" ]; then
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix packages/browser-extension
            node -e "
              const fs = require('fs');
              const p = 'packages/browser-extension/manifest.json';
              const m = JSON.parse(fs.readFileSync(p, 'utf8'));
              m.version = process.env.VERSION;
              fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
            "
          fi
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build CLI
        if: needs.prepare.outputs.cli_changed == 'true'
        run: pnpm -C packages/cli run build

      - name: Package CLI
        if: needs.prepare.outputs.cli_changed == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          rm -rf artifacts
          pnpm --filter "@lucerowb/dot-vault" deploy --prod "artifacts/dotvault-cli"
          tar -czf "dotvault-cli-${VERSION}.tar.gz" -C artifacts dotvault-cli
          (cd packages/cli && pnpm pack --pack-destination "$GITHUB_WORKSPACE")
          PACKED=$(ls -1 "$GITHUB_WORKSPACE"/*.tgz | head -1)
          test -n "$PACKED"
          mv "$PACKED" "dotvault-cli-${VERSION}.npm.tgz"
          ls -la "dotvault-cli-${VERSION}".*

      - name: Build browser extension
        if: needs.prepare.outputs.extension_changed == 'true'
        env:
          # Optional repo/org variable: bakes default server URL into release builds
          DOTVAULT_API_URL: ${{ vars.DOTVAULT_API_URL }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: pnpm -C packages/browser-extension run build

      - name: Verify browser extension icons
        if: needs.prepare.outputs.extension_changed == 'true'
        run: |
          set -euo pipefail
          for size in 16 32 48 128; do
            test -f "packages/browser-extension/dist/icons/icon${size}.png"
          done

      - name: Package browser extension
        if: needs.prepare.outputs.extension_changed == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          test -d packages/browser-extension/dist
          (cd packages/browser-extension/dist && zip -qr "$GITHUB_WORKSPACE/dotvault-extension-${VERSION}.zip" .)
          ls -la "dotvault-extension-${VERSION}.zip"

      - name: Checksums
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          SUMFILE="SHA256SUMS-${VERSION}.txt"
          : > "$SUMFILE"
          for f in "dotvault-cli-${VERSION}.tar.gz" "dotvault-cli-${VERSION}.npm.tgz" "dotvault-extension-${VERSION}.zip"; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> "$SUMFILE"
            fi
          done
          if [ ! -s "$SUMFILE" ]; then
            echo "::error::No release artifacts in $(pwd)"
            ls -la
            exit 1
          fi
          cat "$SUMFILE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: DotVault ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            dotvault-cli-${{ needs.prepare.outputs.version }}.tar.gz
            dotvault-cli-${{ needs.prepare.outputs.version }}.npm.tgz
            dotvault-extension-${{ needs.prepare.outputs.version }}.zip
            SHA256SUMS-${{ needs.prepare.outputs.version }}.txt
          fail_on_unmatched_files: false

  npm-publish:
    name: Publish to npm
    needs: [prepare, github-release]
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.cli_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          always-auth: true
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set CLI version
        run: |
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version --prefix packages/cli

      - name: Build and publish CLI
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN not set — skip npm publish."
            exit 0
          fi
          pnpm run build
          npm whoami
          npm publish --access public

  homebrew-formula:
    name: Update Homebrew formula
    needs: [prepare, github-release]
    if: needs.prepare.outputs.should_release == 'true' && needs.prepare.outputs.cli_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump Formula/dot-vault.rb
        run: ./scripts/update-homebrew-formula.sh "${{ needs.prepare.outputs.version }}"

      - name: Commit formula bump
        run: |
          if git diff --quiet Formula/dot-vault.rb; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/dot-vault.rb
          git commit -m "chore(homebrew): dot-vault ${{ needs.prepare.outputs.version }}"
          git push
